<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .form-style {
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #ddd;

      display: flex;
      flex-direction: column;
      gap: 8px;

      max-width: 300px;
    }

    hr {
      border: 0;
      border-top: 1px solid #ddd;
    }

    .input-label {
      display: flex;
      flex-direction: column;
    }

    .input-label.ast strong:after {
      content: '*';
      color: orange;
    }



    .input-label input {
      height: 32px;
    }
  </style>
</head>

<body>
  <div>
    <h2>1. 회원가입</h2>
    <form class="form-style" action="http://localhost:3000/user/signup" method="POST">
      <label class="input-label ast">
        <strong>이메일 주소</strong>
        <input type="email" name="email" />
      </label>
      <label class="input-label ast">
        <strong>비밀번호</strong>
        <input type="password" name="pw" />
      </label>
      <label class="input-label ast">
        <strong>이름</strong>
        <input type="text" name="name" />
      </label>
      <label class="input-label">
        <strong>연락처</strong>
        <input type="tel" name="phone" />
      </label>
      <button>회원가입</button>
    </form>
  </div>
  <hr />
  <div>
    <h2>2. 로그인</h2>
    <div class="form-style">
      <label class="input-label">
        <strong>아이디</strong>
        <input type="text" name="email" id="loginEmailInput" placeholder="아이디" />
      </label>
      <label class="input-label">
        <strong>비밀번호</strong>
        <input type="password" name="pw" id="loginPwInput" placeholder="비밀번호" />
      </label>
      <button id="loginBtn">로그인</button>
    </div>
    <p id="welcomeTxt"></p>
  </div>
  <div>
    <h2>3. 로그아웃</h2>
    <button id="logoutBtn">로그아웃</button>
  </div>


  <!-- <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="./common/socket.js"></script> -->
  <script>
    document.getElementById("loginBtn").addEventListener("click", () => {
      const value_id = document.getElementById("loginEmailInput").value;
      const value_pw = document.getElementById("loginPwInput").value;

      if (!value_id || !value_pw) {
        alert("로그인 정보를 입력해주세요.");
        return;
      }
      fetch("http://localhost:3000/user/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        // 2. 객체를 JSON 문자열로 변환해서 body에 담아야 합니다.
        body: JSON.stringify({
          email: value_id,
          pw: value_pw,
        }),
      })
        .then(response => {
          console.log(response);
          if (!response.ok) {
            alert('아이디 또는 비밀번호가 잘못되었습니다.');
            return null;
          }
          return response.json();
        })
        .then((resData) => {
          if (!resData) return;

          window.localStorage.setItem("fuzDataToken", resData.token);

          document.getElementById("welcomeTxt").innerText = resData.data.name + "님 환영합니다.";
        });
    });


    document.getElementById('logoutBtn').addEventListener("click", () => {
      window.localStorage.removeItem("fuzDataToken");
      document.getElementById("welcomeTxt").innerText = "";
    });
  </script>
</body>

</html>
