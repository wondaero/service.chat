<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .form-style {
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #ddd;

      display: flex;
      flex-direction: column;
      gap: 8px;

      max-width: 300px;
    }

    hr {
      border: 0;
      border-top: 1px solid #ddd;
    }

    .input-label {
      display: flex;
      flex-direction: column;
    }

    .input-label.ast strong:after {
      content: '*';
      color: orange;
    }



    .input-label input {
      height: 32px;
    }
  </style>
</head>

<body>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById("loginBtn").addEventListener("click", () => {
        const value_id = document.getElementById("loginEmailInput").value;
        const value_pw = document.getElementById("loginPwInput").value;

        if (!value_id || !value_pw) {
          alert("로그인 정보를 입력해주세요.");
          return;
        }
        fetch("http://localhost:3000/user/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          // 2. 객체를 JSON 문자열로 변환해서 body에 담아야 합니다.
          body: JSON.stringify({
            email: value_id,
            pw: value_pw,
          }),
        })
          .then(response => {
            console.log(response);
            if (!response.ok) {
              alert('아이디 또는 비밀번호가 잘못되었습니다.');
              return null;
            }
            return response.json();
          })
          .then((resData) => {
            if (!resData) return;

            window.localStorage.setItem("fuzDataToken", resData.token);

            document.getElementById("welcomeTxt").innerText = resData.data.name + "님 환영합니다.";
            getUserList();
          });
      });

      function getUserList() {
        const token = window.localStorage.getItem("fuzDataToken");
        if (!token) return;

        fetch("http://localhost:3000/user", {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
          },
        })
      }


      document.getElementById('logoutBtn').addEventListener("click", () => {
        window.localStorage.removeItem("fuzDataToken");
        document.getElementById("welcomeTxt").innerText = "";
      });

      document.getElementById('projectForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // 2. 폼 안에 입력된 데이터들을 긁어 모읍니다.
        const formData = new FormData(e.target);
        const formPayload = Object.fromEntries(formData.entries());

        const token = window.localStorage.getItem('fuzDataToken');

        try {
          const response = await fetch("http://localhost:3000/project", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}` // 👈 헤더에 안전하게 토큰 탑재!
            },
            body: JSON.stringify(formPayload)
          });

          const result = await response.json();

          if (response.ok) {
            alert("프로젝트가 성공적으로 생성되었습니다!");
            console.log("생성된 데이터:", result.data);
          } else {
            alert(`생성 실패: ${result.message}`);
          }

        } catch (error) {
          console.error('API 요청 중 에러 발생:', error);
          alert('알 수 없는 오류가 발생했습니다.');
        }

      })
      document.getElementById('addParticipantsBtn').addEventListener('click', async (e) => {
        const inputs = e.target.closest('#participantsForm').querySelectorAll('input');
        const user = [];

        inputs.forEach(input => {
          if (input.closest('[data-id="user"]') && input.value) {
            const val = input.value.replaceAll(' ', '').split(',');
            user.push({
              id: val[0],         // 👈 백엔드 규격인 'id'로 수정!
              start_date: val[1],
              end_date: val[2],
              mm_value: Number(val[3]),
              monthly_cost: Number(val[4]),
              level: val[5],
              role: val[6],
              note: val[7] || ''  // 👈 백엔드 규격인 'note'로 수정!
            })
          }
        });

        const project_id = document.querySelector('#participantsForm [data-id="project"] input').value;
        const token = window.localStorage.getItem('fuzDataToken');

        try {
          // 🎯 app.ts의 라우팅과 완벽히 맞춘 주소 (/participant)
          const response = await fetch("http://localhost:3000/participant", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}`
            },
            // 🎯 JSON 문자열화 완료!
            body: JSON.stringify({
              project_id: project_id,
              users: user
            })
          });

          const result = await response.json();

          if (response.ok) {
            alert("투입인원이 성공적으로 생성되었습니다!");
          } else {
            alert(`생성 실패: ${result.message}`);
          }

        } catch (error) {
          console.error('API 요청 중 에러 발생:', error);
          alert('알 수 없는 오류가 발생했습니다.');
        }
      })

      document.getElementById('initPage_dashboard').onclick = async () => {

        // 🎯 1. 함수 내부에서 토큰을 가져오도록 변수 선언 추가!
        const token = window.localStorage.getItem('fuzDataToken');

        const response = await fetch("http://localhost:3000/screen/dashboard", {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
        });

      }


    })
  </script>

  <div>
    <h2>7. 페이지 버튼</h2>
    <button id="initPage_dashboard">대시보드 페이지</button>
    <button id="initPage_projects">프로젝트 페이지</button>
  </div>
  <hr />
  <div>
    <h2>6. 투입인원 추가</h2>
    <div id="participantsForm" class="form-style">
      <label class="input-label ast" data-id="project">
        <strong>프로젝트 아이디</strong>
        <input type="number" name="name" />
      </label>
      <label class="input-label ast" data-id="user">
        <strong>유저(id, 시작일, 종료일, mm, 단가, 등급, 역할, 메모</strong>
        <input type="text" />
      </label>
      <label class="input-label ast" data-id="user">
        <strong>유저(id, 시작일, 종료일, mm, 단가, 등급, 역할, 메모</strong>
        <input type="text" />
      </label>
      <label class="input-label ast" data-id="user">
        <strong>유저(id, 시작일, 종료일, mm, 단가, 등급, 역할, 메모</strong>
        <input type="text" />
      </label>
      <label class="input-label ast" data-id="user">
        <strong>유저(id, 시작일, 종료일, mm, 단가, 등급, 역할, 메모</strong>
        <input type="text" />
      </label>
      <button id="addParticipantsBtn">투입인원 추가</button>
    </div>
  </div>
  <hr />
  <div>
    <h2>5. 프로젝트 생성</h2>
    <form id="projectForm" class="form-style" action="http://localhost:3000/project/" method="POST">
      <label class="input-label ast">
        <strong>프로젝트명</strong>
        <input type="text" name="name" />
      </label>
      <label class="input-label ast">
        <strong>발주처</strong>
        <input type="text" name="client_name" />
      </label>
      <label class="input-label ast">
        <strong>유형(나중에 selectbox로)</strong>
        <input type="text" name="project_type" />
      </label>
      <label class="input-label ast">
        <strong>진행상태(나중에 selectbox로)</strong>
        <input type="text" name="status" />
      </label>
      <label class="input-label ast">
        <strong>시작일</strong>
        <input type="date" name="start_date" />
      </label>
      <label class="input-label ast">
        <strong>종료일</strong>
        <input type="date" name="end_date" />
      </label>
      <label class="input-label ast">
        <strong>수주금액</strong>
        <input type="text" name="budget" />
      </label>
      <label class="input-label">
        <strong>필요인력(기획)</strong>
        <input type="number" name="required_planner" />
      </label>
      <label class="input-label">
        <strong>필요인력(디자인)</strong>
        <input type="number" name="required_designer" />
      </label>
      <label class="input-label">
        <strong>필요인력(퍼블리싱)</strong>
        <input type="number" name="required_publisher" />
      </label>
      <label class="input-label">
        <strong>필요인력(개발)</strong>
        <input type="number" name="required_developer" />
      </label>
      <label class="input-label">
        <strong>필요인력(기타)</strong>
        <input type="number" name="required_etc" />
      </label>
      <label class="input-label">
        <strong>특이사항</strong>
        <textarea type="text" name="note"></textarea>
      </label>
      <button>프로젝트 생성</button>
    </form>
  </div>
  <hr />
  <div>
    <h2>3. 로그아웃</h2>
    <button id="logoutBtn">로그아웃</button>
  </div>
  <hr />
  <div>
    <h2>2. 로그인</h2>
    <div class="form-style">
      <label class="input-label">
        <strong>아이디</strong>
        <input type="text" name="email" id="loginEmailInput" placeholder="아이디" />
      </label>
      <label class="input-label">
        <strong>비밀번호</strong>
        <input type="password" name="pw" id="loginPwInput" placeholder="비밀번호" />
      </label>
      <button id="loginBtn">로그인</button>
    </div>
    <p id="welcomeTxt"></p>
  </div>
  <hr />
  <div>
    <h2>1. 회원가입</h2>
    <form class="form-style" action="http://localhost:3000/user/signup" method="POST">
      <label class="input-label ast">
        <strong>이메일 주소</strong>
        <input type="email" name="email" />
      </label>
      <label class="input-label ast">
        <strong>비밀번호</strong>
        <input type="password" name="pw" />
      </label>
      <label class="input-label ast">
        <strong>이름</strong>
        <input type="text" name="name" />
      </label>
      <label class="input-label">
        <strong>연락처</strong>
        <input type="tel" name="phone" />
      </label>
      <button>회원가입</button>
    </form>
  </div>
  <hr />

</body>

</html>
